# Baseline: uniform sampling, no curriculum
# Serves as the control condition (Table I)

experiment:
  name: baseline_full
  description: "GameFormer with uniform sampling (no curriculum)"

model:
  encoder_layers: 3
  decoder_levels: 2
  num_neighbors: 10
  modalities: 6

training:
  train_epochs: 20
  batch_size: 8
  learning_rate: 1.0e-4
  gradient_accumulation_steps: 4
  use_amp: true
  grad_clip: 5.0
  lr_milestones: [10, 12, 14, 16, 18]
  lr_gamma: 0.5
  seed: 3407
  device: cuda

data:
  train_dir: "${DATA_DIR}/train"
  valid_dir: "${DATA_DIR}/val"
  fraction: 1.0
  num_workers: 8

curriculum:
  enabled: false

paths:
  log_dir: "./training_log"
